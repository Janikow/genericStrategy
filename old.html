<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Combat Simulation</title>
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:Arial,sans-serif;font-size:13px;color:#000;background:#fff}
h2{font-size:13px;font-weight:bold;margin:0 0 3px}
button{font-family:Arial,sans-serif;font-size:12px;background:#fff;border:1px solid #000;cursor:pointer;padding:2px 8px;border-radius:0;color:#000}
button:hover:not(:disabled){background:#e0e0e0}
button:disabled{color:#aaa;cursor:default;border-color:#ccc}
button:active:not(:disabled){transform:scale(0.98)}
.topbar{display:flex;justify-content:space-between;align-items:flex-start;border-bottom:1px solid #000;padding:5px 10px 4px;background:#fff}
.topbar h1{font-size:15px;font-weight:bold;margin:0 0 1px}
.topbar-sub{font-size:11px;color:#555}
.topbar-right{text-align:right;font-size:11px;color:#555}
.layout{display:grid;grid-template-columns:1.2fr 1fr 0.85fr;gap:8px;padding:8px}
.col{display:flex;flex-direction:column;gap:8px}
.sec-head{font-weight:bold;font-size:13px;display:block;margin-bottom:2px}
hr.divider{border:none;border-top:1px solid #000;margin:2px 0 5px}
.arena{border:1px solid #000;padding:5px 7px}
.arena-hdr{display:flex;justify-content:space-between;font-size:10px;color:#666;margin-bottom:3px}
.frow{display:flex;align-items:center;gap:5px;margin:3px 0}
.fname{font-weight:bold;font-size:12px;width:110px;flex-shrink:0;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.hpwrap{flex:1;display:flex;align-items:center;gap:4px}
.hptrack{flex:1;height:9px;border:1px solid #000;background:#fff;overflow:hidden}
.hpfill{height:100%;background:#000;transition:width 0.3s}
.hpnums{font-size:10px;width:58px;text-align:right;flex-shrink:0;font-family:'Courier New',monospace}
.vsrow{text-align:center;font-size:10px;color:#aaa;letter-spacing:3px;margin:1px 0}
#msgbox{border:1px solid #000;padding:4px 6px;min-height:36px;font-size:12px;font-family:'Courier New',monospace;background:#fffff8;line-height:1.5}
.cursor{display:inline-block;width:7px;height:11px;background:#000;vertical-align:middle;margin-left:1px;animation:blink 0.9s step-end infinite}
@keyframes blink{50%{opacity:0}}
.moves-grid{display:grid;grid-template-columns:1fr 1fr;gap:3px}
.mbtn{text-align:left;padding:2px 5px;width:100%;border-radius:0;position:relative}
.mbtn-name{font-weight:bold;font-size:12px;display:block}
.mbtn-sub{font-size:10px;color:#666;display:block;margin-top:1px}
.mbtn-pp{font-size:10px;color:#999;font-family:'Courier New',monospace}
.stattbl{width:100%;border-collapse:collapse;font-size:11px;font-family:'Courier New',monospace}
.stattbl td{padding:1px 0}
.stattbl .k{color:#555;padding-right:6px;width:55%}
.stattbl .v{font-weight:bold}
#logbox{height:110px;overflow-y:auto;font-family:'Courier New',monospace;font-size:10px;line-height:1.6;border:1px solid #ccc;padding:3px 5px;background:#fafafa}
.le{display:block}
.le.sys{font-weight:bold}
.le.proj{color:#333;font-style:italic}
#resultbox{display:none;border:2px solid #000;padding:10px;margin:8px;text-align:center}
#resultbox.show{display:block}
.shop-section{border:1px solid #000;padding:5px 7px}
.shop-items-grid{display:grid;grid-template-columns:1fr 1fr 1fr;gap:3px}
.shop-item{border:1px solid #000;padding:3px 4px;background:#fff;cursor:pointer;text-align:left;width:100%}
.shop-item:hover:not(:disabled){background:#e0e0e0}
.shop-item:disabled{color:#aaa;border-color:#ccc;cursor:default}
.tooltip-wrap{position:relative;display:inline-block;width:100%}
.tooltip-box{display:none;position:absolute;z-index:5000;background:#fff;border:1px solid #000;padding:6px 8px;font-size:11px;font-family:'Courier New',monospace;white-space:pre;min-width:180px;max-width:260px;line-height:1.5;pointer-events:none;box-shadow:2px 2px 0 #ccc;left:100%;top:0;margin-left:4px}
.tooltip-wrap:hover .tooltip-box{display:block}
#minigame-overlay{display:none;position:fixed;top:0;left:0;width:100%;height:100%;background:rgba(0,0,0,0.82);z-index:8000;align-items:center;justify-content:center;flex-direction:column}
#minigame-overlay.active{display:flex}
.mg-box{background:#fff;border:2px solid #000;padding:14px 20px;min-width:320px;text-align:center}
.mg-timer-bar-wrap{background:#eee;border:1px solid #aaa;height:8px;margin-bottom:10px;overflow:hidden}
.mg-timer-bar{height:100%;background:#000}
.mg-keys-row{display:flex;gap:6px;justify-content:center;margin-bottom:8px}
.mg-key{display:inline-flex;align-items:center;justify-content:center;width:38px;height:38px;border:2px solid #000;font-size:18px;font-weight:bold}
.mg-key.hit{background:#000;color:#fff}
.mg-key.next{box-shadow:0 0 0 2px #000}
</style>
</head>
<body>

<div class="topbar">
  <div>
    <h1>Combat Simulation</h1>
    <div class="topbar-sub">Wave <b id="wave-top">1</b> | Level <b id="level-top">1</b></div>
  </div>
  <div class="topbar-right">
    <div id="turn-line" style="font-style:italic">Turn 1 — your move</div>
    <div style="margin-top:2px">Score: <b><span id="score-top">0</span></b> &nbsp; Gold: <b><span id="gold-top">0</span></b></div>
  </div>
</div>

<div id="resultbox">
  <span id="result-title" style="font-size:20px;font-weight:bold"></span>
  <div id="result-detail" style="font-size:11px;font-family:'Courier New',monospace;margin:8px 0"></div>
  <button id="next-btn" onclick="initGame()" style="margin-top:6px">New Game</button>
</div>

<div class="layout" id="main-layout">
  <div class="col">
    <div>
      <span class="sec-head">Status</span>
      <hr class="divider">
      <div class="arena">
        <div class="arena-hdr"><span>Unit Status</span><span id="arena-wave">Wave 1</span></div>
        <div class="frow">
          <div class="fname">Unit Alpha</div>
          <div class="hpwrap">
            <div class="hptrack"><div class="hpfill" id="player-fill" style="width:100%"></div></div>
            <div class="hpnums" id="player-nums">120/120</div>
          </div>
        </div>
        <div class="vsrow">- VS -</div>
        <div class="frow">
          <div class="fname" id="ai-name-el">Unit Beta</div>
          <div class="hpwrap">
            <div class="hptrack"><div class="hpfill" id="ai-fill" style="width:100%"></div></div>
            <div class="hpnums" id="ai-nums">120/120</div>
          </div>
        </div>
      </div>
    </div>

    <div id="msgbox"><span id="msgtxt">Initializing...</span><span class="cursor"></span></div>

    <div>
      <span class="sec-head">Select Move</span>
      <hr class="divider">
      <div class="moves-grid" id="moves-grid"></div>
    </div>

    <div>
      <span class="sec-head">Shop</span>
      <hr class="divider">
      <div class="shop-section">
        <div class="shop-items-grid" id="shop-grid"></div>
      </div>
    </div>
  </div>

  <div class="col">
    <div>
      <span class="sec-head">Radar Chart</span>
      <hr class="divider">
      <canvas id="radarChart" style="width:100%;max-height:200px"></canvas>
    </div>
    <div>
      <span class="sec-head">Battle Log</span>
      <hr class="divider">
      <div id="logbox"></div>
    </div>
  </div>

  <div class="col">
    <div>
      <span class="sec-head">Combat Stats</span>
      <hr class="divider">
      <table class="stattbl">
        <tr><td class="k">ATK</td><td class="v" id="s-atk">10</td></tr>
        <tr><td class="k">DEF</td><td class="v" id="s-def">10</td></tr>
        <tr><td class="k">SPD</td><td class="v" id="s-spd">10</td></tr>
      </table>
    </div>
  </div>
</div>

<div id="minigame-overlay">
  <div class="mg-box">
    <div id="mg-move-name" style="font-weight:bold;margin-bottom:10px"></div>
    <div class="mg-timer-bar-wrap"><div class="mg-timer-bar" id="mg-timer-bar" style="width:100%"></div></div>
    <div class="mg-keys-row" id="mg-keys-row"></div>
    <div id="mg-result" style="font-family:'Courier New',monospace;font-weight:bold"></div>
  </div>
</div>

<script src="https://cdnjs.cloudflare.com/ajax/libs/Chart.js/4.4.1/chart.umd.js"></script>
<script>
const rnd=(a,b)=>Math.floor(Math.random()*(b-a+1))+a;

// --- DATA ---
const BASE_PMOVES = [
  { id:'quick', name:'Quick Strike', dmg:18, acc:100, pp:20, priority: 1, desc:'Always goes first' },
  { id:'heavy', name:'Heavy Slam', dmg:32, acc:75, pp:10, priority: 0, desc:'High damage, risky' },
  { id:'shock', name:'System Shock', dmg:12, acc:90, pp:12, priority: 0, desc:'40% Stun chance', fx:[{type:'stun',chance:0.4}] }
];

const SHOP_ITEMS = [
  { id:'clens', name:'Critical Lens', cost:60, desc:'Next move chance effects -> 100%' },
  { id:'atkup', name:'ATK Shard', cost:100, desc:'+5 ATK permanently' }
];

let G = {
  player: { hp:120, maxHp:120, atk:12, def:10, spd:10, gold:100, clens:false, moves:[] },
  ai: { hp:120, maxHp:120, atk:10, def:10, spd:8, name:'Unit Beta' },
  wave: 1, busy: false, turn: 1
};

let radarChart;

// --- CORE ---
function initGame() {
  G.player.moves = JSON.parse(JSON.stringify(BASE_PMOVES));
  renderAll();
  initRadar();
  addLog("System Online. Awaiting command.");
}

function renderAll() {
  document.getElementById('player-nums').textContent = `${G.player.hp}/${G.player.maxHp}`;
  document.getElementById('player-fill').style.width = (G.player.hp/G.player.maxHp*100)+'%';
  document.getElementById('ai-nums').textContent = `${G.ai.hp}/${G.ai.maxHp}`;
  document.getElementById('ai-fill').style.width = (G.ai.hp/G.ai.maxHp*100)+'%';
  document.getElementById('gold-top').textContent = G.player.gold;
  document.getElementById('s-atk').textContent = G.player.atk;
  document.getElementById('s-def').textContent = G.player.def;
  document.getElementById('s-spd').textContent = G.player.spd;

  const mGrid = document.getElementById('moves-grid');
  mGrid.innerHTML = '';
  G.player.moves.forEach(m => {
    const btn = document.createElement('button');
    btn.className = 'mbtn';
    btn.onclick = () => startMove(m);
    btn.innerHTML = `<span class="mbtn-name">${m.name}</span><span class="mbtn-sub">${m.desc}</span>`;
    mGrid.appendChild(btn);
  });

  const sGrid = document.getElementById('shop-grid');
  sGrid.innerHTML = '';
  SHOP_ITEMS.forEach(item => {
    const wrap = document.createElement('div');
    wrap.className = 'tooltip-wrap';
    wrap.innerHTML = `<button class="shop-item" onclick="buyItem('${item.id}')">${item.name} (${item.cost}g)</button><div class="tooltip-box">${item.desc}</div>`;
    sGrid.appendChild(wrap);
  });
}

function addLog(msg, cls='') {
  const box = document.getElementById('logbox');
  box.innerHTML += `<span class="le ${cls}">${msg}</span>`;
  box.scrollTop = box.scrollHeight;
}

function buyItem(id) {
  const item = SHOP_ITEMS.find(x => x.id === id);
  if (G.player.gold >= item.cost) {
    G.player.gold -= item.cost;
    if (id === 'clens') G.player.clens = true;
    if (id === 'atkup') G.player.atk += 5;
    addLog(`Bought ${item.name}.`, 'sys');
    renderAll();
    updateRadar();
  }
}

// --- TURN LOGIC ---
async function startMove(m) {
  if (G.busy) return;
  G.busy = true;

  // Minigame
  const mult = await runMinigame(m.name);
  if (mult === 0) {
    addLog("Attack failed!", "sys");
    await enemyTurn();
  } else {
    // Priority check
    const aiMove = G.player.moves[rnd(0, 2)];
    const pFirst = (m.priority > (aiMove.priority||0)) || (G.player.spd >= G.ai.spd);

    if (pFirst) {
      await applyMove(m, G.player, G.ai, mult);
      if (G.ai.hp > 0) await enemyTurn();
    } else {
      await enemyTurn();
      if (G.player.hp > 0) await applyMove(m, G.player, G.ai, mult);
    }
  }

  G.busy = false;
  G.turn++;
  checkWin();
}

async function applyMove(move, atk, def, mult=1) {
  addLog(`${atk === G.player ? 'Alpha' : 'Beta'} used ${move.name}`);
  
  let dmg = Math.floor((move.dmg + atk.atk - def.def/2) * mult);
  dmg = Math.max(1, dmg);
  def.hp = Math.max(0, def.hp - dmg);
  
  // Critical Lens Logic
  if (move.fx && move.fx.length > 0) {
    move.fx.forEach(f => {
      let effChance = f.chance;
      if (atk === G.player && G.player.clens) {
        effChance = 1.0; // 100% guarantee
        G.player.clens = false;
        addLog("Critical Lens ensured effect trigger!", "sys");
      }
      if (Math.random() < effChance) {
        addLog(`Effect Triggered: ${f.type.toUpperCase()}`, "proj");
      }
    });
  }

  renderAll();
  await new Promise(r => setTimeout(r, 800));
}

async function enemyTurn() {
  const move = G.player.moves[rnd(0, 2)];
  await applyMove(move, G.ai, G.player);
}

function checkWin() {
  if (G.ai.hp <= 0) {
    addLog("Victory!", "sys");
    G.player.gold += 50;
    G.wave++;
    G.ai.hp = G.ai.maxHp = 120 + (G.wave * 15);
    G.ai.atk += 2;
    renderAll();
  }
}

// --- MINIGAME ---
function runMinigame(name) {
  return new Promise(resolve => {
    const overlay = document.getElementById('minigame-overlay');
    overlay.classList.add('active');
    document.getElementById('mg-move-name').textContent = "Executing: " + name;
    
    const keys = ['W','A','S','D'];
    const seq = [keys[rnd(0,3)], keys[rnd(0,3)], keys[rnd(0,3)]];
    const row = document.getElementById('mg-keys-row');
    row.innerHTML = '';
    seq.forEach(k => row.innerHTML += `<div class="mg-key">${k}</div>`);
    
    let idx = 0;
    const start = Date.now();
    const handleKey = (e) => {
      if (e.key.toUpperCase() === seq[idx]) {
        row.children[idx].classList.add('hit');
        idx++;
        if (idx === seq.length) {
          const time = Date.now() - start;
          const mult = time < 1500 ? 1.25 : 1.0;
          cleanup(mult);
        }
      } else { cleanup(0); }
    };

    function cleanup(res) {
      window.removeEventListener('keydown', handleKey);
      overlay.classList.remove('active');
      resolve(res);
    }
    window.addEventListener('keydown', handleKey);
  });
}

// --- RADAR ---
function initRadar() {
  const ctx = document.getElementById('radarChart');
  radarChart = new Chart(ctx, {
    type: 'radar',
    data: {
      labels: ['ATK', 'DEF', 'SPD'],
      datasets: [{
        label: 'Alpha',
        data: [G.player.atk, G.player.def, G.player.spd],
        backgroundColor: 'rgba(0,0,0,0.1)', borderColor: '#000', borderWidth: 1
      }, {
        label: 'Beta',
        data: [G.ai.atk, G.ai.def, G.ai.spd],
        backgroundColor: 'rgba(200,200,200,0.1)', borderColor: '#aaa', borderWidth: 1
      }]
    },
    options: { scales: { r: { suggestMin: 0, suggestMax: 20 } }, plugins: { legend: { display: false } } }
  });
}

function updateRadar() {
  radarChart.data.datasets[0].data = [G.player.atk, G.player.def, G.player.spd];
  radarChart.update();
}

initGame();
</script>
</body>
</html>
